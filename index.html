<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="google" content="notranslate" />
    <!-- The admin SPA is internal-only — block search-engine indexing of
         /admin/ and any sub-resource under it (config.js, asset bundle,
         …). Pair this with a `Disallow: /admin/` line in your public
         robots.txt for crawlers that honour that hint. -->
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="googlebot" content="noindex, nofollow, noarchive" />
    <title>Flexweg CMS — Admin</title>
    <script>
      // Anti-FOUC: apply the saved theme synchronously, before React renders.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "dark" || stored === "light" ? stored : prefersDark ? "dark" : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <!--
      Import-map redirecting bare specifiers used by externally-loaded
      plugins/themes to small stub files in /admin/runtime/. Each stub
      reads the live React / i18n / cms-runtime instances out of
      window.__FLEXWEG_RUNTIME__ (populated by src/core/flexwegRuntime.ts)
      so an external bundle and the admin SPA share the SAME module
      instance — required for React hooks integrity and i18next state.
      Native browser support: Chrome 89+, Firefox 108+, Safari 16.4+.
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "./runtime/react.js",
          "react/jsx-runtime": "./runtime/react-jsx-runtime.js",
          "react-dom": "./runtime/react-dom.js",
          "react-dom/client": "./runtime/react-dom-client.js",
          "react-i18next": "./runtime/react-i18next.js",
          "@flexweg/cms-runtime": "./runtime/cms-runtime.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime config bootstrap — must load synchronously, before the main
         bundle, so the Firebase resolver can read window.__FLEXWEG_CONFIG__
         during module init. See public/config.js for details. -->
    <script src="./config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
